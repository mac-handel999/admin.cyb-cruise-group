<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYB CRUISE GROUP | Authentication Terminal</title>



    <script>
        (function enforceAccessControl() {
            const localToken = localStorage.getItem('cruise_session_token');
            const localReg = localStorage.getItem('cruise_user_reg');
            const loginTime = localStorage.getItem('cruise_login_time');

            const currentPath = window.location.pathname;
            const onLoginPage = currentPath.endsWith('/index.html') || currentPath.endsWith('/');

            // Define the expiration lifespan: 3 Days = 3 * 24 * 60 * 60 * 1000 milliseconds
            const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

            if (!localToken || !localReg || !loginTime) {
                if (!onLoginPage) window.location.href = 'Home.html';
            } else {
                // Check if token age exceeds 3 days
                const sessionAge = Date.now() - parseInt(loginTime);

                if (sessionAge > THREE_DAYS_MS) {
                    if (!onLoginPage) {
                        // Wipe credentials and flag the expiration before redirecting
                        localStorage.removeItem('cruise_session_token');
                        localStorage.removeItem('cruise_user_reg');
                        localStorage.removeItem('cruise_user_name');
                        localStorage.removeItem('cruise_login_time');

                        alert("SESSION EXPIRED: Security tokens must be rotated every 3 days. Please re-authenticate at the login terminal.");
                        window.location.href = '/index.html';
                    }
                } else {
                    if (onLoginPage) window.location.href = 'Home.html';
                }
            }
        })();
    </script>


    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
 

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="/Images/cyb-cruise-group-logo.png" type="image/x-icon/png">
    <link rel="apple-touch-icon" sizes="180x180" href="/Images/cyb-cruise-group-logo.png">

</head>

<body>




    <div class="login-matrix">

        <img src="/Images/cyb-cruise-group-logo-1.png.png" alt="CRUISE GROUP Logo" class="nav-logo" width="250"
            height="250" id="loginLogo">

        <h2 id="features-text" style="margin-bottom: 5px;">COURSE REP IDENTITY GATEWAY</h2>
        <p style="color: #cbd5e1; font-family: monospace; font-size: 0.8rem; margin-bottom: 30px;">CYB CRUISE LAYER
            CHECKPOINT</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="studentName"><i class="fa fa-user"></i> Student Full Name</label>
                <input type="text" id="studentName" class="input-field" placeholder="SURNAME FIRSTNAME OTHERS" required
                    autocomplete="off">
            </div>

            <div class="input-group">
                <label for="studentReg"><i class="fa fa-vcard"></i> Registration Number</label>
                <input type="text" id="studentReg" class="input-field" placeholder="202414XXXXX" required
                    autocomplete="off">
            </div>

            <button type="submit" class="auth-btn">Authorize Session</button>
        </form>

        <div id="statusReport" class="status-terminal">SYSTEM STATUS: READY</div>
        <br />




        <div id="pwaInstallContainer" style="display: none; padding: 0; margin: 20px 0 10px 0; width: 100%;">
            <button id="pwaInstallBtn"
                style="background: #800020; color: #fff; border: 1px solid #00d4ff; padding: 12px; font-family: monospace; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;">
                📲 INSTALL CRUISE GROUP APP TO DESKTOP
            </button>
        </div>

    </div>



    
    <script src="pwa-installer.js"></script>
    






    <script src="auth.js"></script>

</body>

</html>
