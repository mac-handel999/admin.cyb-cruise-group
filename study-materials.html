<script>
    (function enforceAccessControl() {
        const localToken = localStorage.getItem('cruise_session_token');
        const localReg = localStorage.getItem('cruise_user_reg');
        const scrambledTime = localStorage.getItem('cruise_login_time');
        
        const currentPath = window.location.pathname;
        const onLoginPage = currentPath.endsWith('index.html') || currentPath.endsWith('/');
        const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

        if (!localToken || !localReg || !scrambledTime) {
            if (!onLoginPage) window.location.href = 'index.html';
        } else {
            try {
                // Unscramble the timestamp to read the raw time integer values
                const decodedTime = atob(scrambledTime);
                const sessionAge = Date.now() - parseInt(decodedTime);
                
                if (sessionAge > THREE_DAYS_MS) {
                    if (!onLoginPage) {
                        localStorage.clear();
                        alert("SESSION EXPIRED: Security tokens must be rotated every 3 days. Please re-authenticate.");
                        window.location.href = 'index.html';
                    }
                } else {
                  if (onLoginPage) window.location.href = 'Home.html';
                }
            } catch (e) {
                // If someone manually tampers with the scrambled string, it breaks atob, triggering an instant boot out
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
    })();
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function (e) {
                e.preventDefault(); // Stop the default link transition

                // Scrub credentials out of local storage matrix
                localStorage.removeItem('cruise_session_token');
                localStorage.removeItem('cruise_user_reg');
                
                alert('You Have Successfully Logged Out!!! ');


                // Redirect back to login terminal screen
                window.location.href = 'index.html';
            });
        }
    });
